<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management - LeaveProject</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="cssusermanagement.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <img
          src="img/197217183_4080498165396721_214085174524642997_n.jpg"
          alt="School Logo"
          class="nav-logo"
          onerror="this.style.display = 'none'"
        />
      </div>
      <div class="nav-center">
        <h1>ระบบลางาน โรงเรียนภูเก็ตปัญญานุกูล</h1>
      </div>
      <div class="nav-right">
        <div class="profile-dropdown">
          <div class="profile-info">
            <div class="profile-text">
              <span id="userFullName" class="user-name">นาย สมชาย ใจดี</span>
              <span id="userSubtype" class="user-subtype">บริหารวิชาการ</span>
            </div>
            <i class="arrow-down"></i>
          </div>
          <div class="dropdown-menu">
            <button id="signOutBtn" class="dropdown-item">
              <span>Sign Out</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="content-container">
      <div class="back-link-wrapper">
        <a href="main.html" class="btn-back">← กลับหน้าเมนูหลัก</a>
      </div>

      <div class="table-box">
        <div class="table-header-title">
          <div class="title-with-btn">
            <h2>รายชื่อบุคลากรในระบบ</h2>
            <button id="refreshBtn" class="btn-refresh" title="รีเฟรชข้อมูล">
              <i class="bi bi-arrow-clockwise icon-refresh-bs"></i>
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="user-table">
            <thead>
              <tr>
                <th>คำนำหน้า</th>
                <th>ชื่อ</th>
                <th>นามสกุล</th>
                <th>เบอร์โทรศัพท์</th>
                <th>อีเมล</th>
                <th>ประเภทบุคลากร</th>
                <th>ฝ่าย / แผนกงานย่อย</th>
                <th>สิทธิ์</th>
                <th>สถานะ</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              <tr>
                <td colspan="10" class="text-center">
                  กำลังโหลดข้อมูลบุคลากรจาก ...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <div id="editUserModal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3>แก้ไขข้อมูลบุคลากร</h3>
        <p
          id="editUserDisplay"
          style="
            font-size: 13px;
            margin-bottom: 20px;
            color: #64748b;
            font-weight: 300;
          "
        ></p>

        <form id="editUserForm">
          <input type="hidden" id="editUserID" />

          <div class="form-group-modal">
            <label for="editStatus">สถานะสมาชิก (Status)</label>
            <select id="editStatus" required>
              <option value="waiting">waiting</option>
              <option value="approve">approve</option>
              <option value="block">block</option>
            </select>
          </div>

          <div class="form-group-modal">
            <label for="editRole">สิทธิ์การใช้งาน (Role)</label>
            <select id="editRole" required>
              <option value="user">user</option>
              <option value="admin">admin</option>
              <option value="director">director</option>
              <option value="deputydirector">deputydirector</option>
            </select>
          </div>

          <div class="modal-footer-btns">
            <button
              type="button"
              id="cancelEditBtn"
              class="modal-btn-secondary"
            >
              ยกเลิก
            </button>
            <button type="submit" class="modal-btn">บันทึกข้อมูล</button>
          </div>

          <div
            class="modal-delete-wrapper"
            style="
              margin-top: 15px;
              border-top: 1px dashed #e2e8f0;
              padding-top: 15px;
            "
          >
            <button
              type="button"
              id="deleteUserBtn"
              class="btn-delete-user"
              title="ลบผู้ใช้งานคนนี้ออกจากระบบ"
            >
              <i class="bi bi-trash"></i> ลบข้อมูลบุคลากรนี้
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="statusModal" class="modal-overlay hidden">
      <div class="modal-card">
        <div id="modalIcon" class="modal-icon"></div>
        <h3 id="modalTitle">ข้อความแจ้งเตือน</h3>
        <button id="modalCloseBtn" class="modal-btn">ตกลง</button>
      </div>
    </div>

    <div id="confirmDeleteModal" class="modal-overlay hidden">
      <div class="modal-card">
        <div
          class="modal-icon error"
          style="background-color: #fee2e2; color: #ef4444"
        >
          <i class="bi bi-exclamation-triangle" style="font-size: 28px"></i>
        </div>
        <h3 style="color: #1e293b; margin-bottom: 10px">ยืนยันการลบข้อมูล</h3>
        <p
          id="confirmDeleteText"
          style="
            font-size: 14px;
            color: #64748b;
            margin-bottom: 25px;
            font-weight: 300;
            white-space: pre-line;
            line-height: 1.6;
          "
        ></p>

        <div class="modal-footer-btns">
          <button
            type="button"
            id="cancelDeleteBtn"
            class="modal-btn-secondary"
          >
            ยกเลิก
          </button>
          <button
            type="button"
            id="submitDeleteBtn"
            class="modal-btn"
            style="background-color: #ef4444"
          >
            ใช่, ต้องการลบ
          </button>
        </div>
      </div>
    </div>

    <script src="jsusermanagement.js"></script>
  </body>
</html>
