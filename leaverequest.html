<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leave Request - LeaveProject</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="cssleaverequest.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <img
          src="img/197217183_4080498165396721_214085174524642997_n.jpg"
          alt="School Logo"
          class="nav-logo"
          onerror="this.style.display = 'none'"
        />
      </div>
      <div class="nav-center">
        <h1>ระบบลางาน โรงเรียนภูเก็ตปัญญานุกูล</h1>
      </div>
      <div class="nav-right">
        <div class="profile-dropdown">
          <div class="profile-info">
            <div class="profile-text">
              <span id="userFullName" class="user-name">Loading...</span>
              <span id="userSubtype" class="user-subtype">Loading...</span>
            </div>
            <i class="arrow-down"></i>
          </div>
          <div class="dropdown-menu">
            <button id="signOutBtn" class="dropdown-item">
              <span>Sign Out</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="content-container">
      <div class="back-link-wrapper">
        <a href="main.html" class="btn-back">← กลับหน้าเมนูหลัก</a>
      </div>

      <div class="form-box">
        <div class="form-header">
          <h2>
            <i class="bi bi-file-earmark-text-fill icon-heading"></i>
            ยื่นใบลา
          </h2>
          <p class="form-subtitle" style="color: #666; margin-bottom: 15px">
            กรุณากรอกข้อมูลการลาให้ครบถ้วนและตรวจสอบวันลาคงเหลือของท่าน
          </p>

          <div
            class="quota-display-container"
            style="
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
              gap: 10px;
              margin-bottom: 25px;
              font-family: &quot;Sarabun&quot;, sans-serif;
            "
          >
            <div
              class="quota-card"
              style="
                background: #eef9ff;
                border-left: 4px solid #3b82f6;
                padding: 10px;
                border-radius: 6px;
              "
            >
              <div style="font-size: 11pt; color: #1e3a8a; font-weight: bold">
                ลาป่วยคงเหลือ
              </div>
              <div
                style="
                  font-size: 16pt;
                  color: #2563eb;
                  font-weight: bold;
                  margin-top: 5px;
                "
              >
                <span id="displaySickRemain">0</span>
                <span style="font-size: 10pt; font-weight: normal; color: #555"
                  >/ <span id="displaySickMax">0</span> วัน</span
                >
              </div>
            </div>

            <div
              class="quota-card"
              style="
                background: #fffbe6;
                border-left: 4px solid #d97706;
                padding: 10px;
                border-radius: 6px;
              "
            >
              <div style="font-size: 11pt; color: #78350f; font-weight: bold">
                ลากิจคงเหลือ
              </div>
              <div
                style="
                  font-size: 16pt;
                  color: #d97706;
                  font-weight: bold;
                  margin-top: 5px;
                "
              >
                <span id="displayPersonalRemain">0</span>
                <span style="font-size: 10pt; font-weight: normal; color: #555"
                  >/ <span id="displayPersonalMax">0</span> วัน</span
                >
              </div>
            </div>

            <div
              class="quota-card"
              style="
                background: #fdf2f8;
                border-left: 4px solid #ec4899;
                padding: 10px;
                border-radius: 6px;
              "
            >
              <div style="font-size: 11pt; color: #9d174d; font-weight: bold">
                ลาคลอดคงเหลือ
              </div>
              <div
                style="
                  font-size: 16pt;
                  color: #db2777;
                  font-weight: bold;
                  margin-top: 5px;
                "
              >
                <span id="displayMaternityRemain">0</span>
                <span style="font-size: 10pt; font-weight: normal; color: #555"
                  >/ <span id="displayMaternityMax">0</span> วัน</span
                >
              </div>
            </div>

            <div
              class="quota-card"
              style="
                background: #f0fdf4;
                border-left: 4px solid #22c55e;
                padding: 10px;
                border-radius: 6px;
              "
            >
              <div style="font-size: 11pt; color: #14532d; font-weight: bold">
                ลาราชการไปแล้ว
              </div>
              <div
                style="
                  font-size: 16pt;
                  color: #16a34a;
                  font-weight: bold;
                  margin-top: 5px;
                "
              >
                <span id="displayOfficialUsed">0</span>
                <span style="font-size: 10pt; font-weight: normal; color: #555"
                  >วัน</span
                >
              </div>
            </div>
          </div>
        </div>

        <form id="leaveRequestForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="leaveType"
                >ประเภทวันลา <span class="required">*</span></label
              >
              <select id="leaveType" required>
                <option value="">-- กรุณาเลือกประเภทการลา --</option>
                <option value="ลาป่วย">ลาป่วย</option>
                <option value="ลากิจ">ลากิจ</option>
                <option value="ลาคลอด">ลาคลอด</option>
                <option value="ลาราชการ">ลาราชการ</option>
              </select>
            </div>

            <div class="form-group">
              <label for="hasSubstitute"
                >ต้องการตัวแทนปฏิบัติหน้าที่แทนหรือไม่
                <span class="required">*</span></label
              >
              <select id="hasSubstitute" required>
                <option value="N">ไม่ต้องการ</option>
                <option value="Y">ต้องการ</option>
              </select>
            </div>

            <div class="form-group">
              <label for="startDate"
                >วันที่เริ่มต้นลา <span class="required">*</span></label
              >
              <input type="date" id="startDate" required />
            </div>

            <div class="form-group">
              <label for="endDate"
                >วันที่สิ้นสุดการลา <span class="required">*</span></label
              >
              <input type="date" id="endDate" required />
            </div>

            <div class="form-group">
              <label for="totalDays">จำนวนวันลาทั้งหมด (วัน)</label>
              <input
                type="number"
                id="totalDays"
                min="1"
                readonly
                placeholder="ระบบจะคำนวณให้อัตโนมัติ"
              />
            </div>
          </div>

          <div class="form-group full-width" style="margin-top: 15px">
            <label for="reason"
              >เหตุผลการลา / หมายเหตุ <span class="required">*</span></label
            >
            <textarea id="reason" rows="4" required></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-submit-leave">ส่งคำขอลางาน</button>
          </div>
        </form>
      </div>
    </main>

    <div id="statusModal" class="modal-overlay hidden">
      <div class="modal-card">
        <div id="modalIcon" class="modal-icon"></div>
        <h3 id="modalTitle">ข้อความแจ้งเตือน</h3>
        <button id="modalCloseBtn" class="modal-btn">ตกลง</button>
      </div>
    </div>

    <script src="jsleaverequest.js"></script>
  </body>
</html>
